name: Update news_signal.csv

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate news_signal.csv
        env:
          TE_CLIENT: ${{ secrets.TE_CLIENT }}
          TE_SECRET: ${{ secrets.TE_SECRET }}
        run: python scripts/fetch_news.py

      - name: Commit updated news_signal.csv
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update news_signal.csv"
          file_pattern: news_signal.csv
